function statusOf(contact) {
  const cad = CADENCES[contact.cadence].days;
  const ratio = contact.lastSeen / cad;
  if (ratio < 0.85) return { key: "ok",   label: "On track",  ratio };
  if (ratio < 1.0)  return { key: "due",  label: "Due soon",  ratio };
  return                   { key: "over", label: "Overdue",   ratio };
}
function initialsOf(name) { return name.split(" ").map(p => p[0]).slice(0, 2).join("").toUpperCase(); }
function daysWord(n) { return n === 1 ? "1 day" : `${n} days`; }

  <script type="text/babel">
function CadenceRing({ ratio, initials, status }) {
  const r = 17;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - Math.min(Math.min(ratio, 1.15), 1));
  const cls = status === "over" ? "over" : status === "due" ? "due" : "ok";
  return (
    <div className="ring" aria-hidden>
      <svg viewBox="0 0 40 40">
        <circle className="track" cx="20" cy="20" r={r} />
        <circle className={`arc ${cls}`} cx="20" cy="20" r={r}
                strokeDasharray={`${c - offset} ${c}`} />
      </svg>
      <div className="ring-initials">{initials}</div>
    </div>
  );
}

function ThemeToggle({ theme, setTheme }) {
  return (
    <div className="theme-toggle" role="tablist" aria-label="Theme">
      <div className="theme-toggle-thumb"
           style={{ transform: `translateX(${theme === "dark" ? "100%" : "0%"})` }} />
      <button className={theme === "light" ? "active" : ""} onClick={() => setTheme("light")}
              role="tab" aria-selected={theme === "light"}>
        <Ic.Sun className="icon-sm" /> Light
      </button>
      <button className={theme === "dark" ? "active" : ""} onClick={() => setTheme("dark")}
              role="tab" aria-selected={theme === "dark"}>
        <Ic.Moon className="icon-sm" /> Dark
      </button>
    </div>
  );
}

function NavItem({ icon, label, active, count, onClick }) {
  return (
    <button className={`nav-item ${active ? "active" : ""}`} onClick={onClick}
            aria-current={active ? "page" : undefined}>
      {icon}
      <span>{label}</span>
      {count !== undefined && <span className="count">{count}</span>}
    </button>
  );
}

function Sidebar({ view, setView, theme, setTheme, counts, onAdd }) {
  return (
    <aside className="sidebar">
      <div className="brand">
        <div className="brand-mark" aria-hidden />
        <div className="brand-name">Circle</div>
      </div>
      <nav className="nav" aria-label="Main navigation">
        <NavItem icon={<Ic.Home className="icon" />}   label="Today"      active={view === "dashboard"} onClick={() => setView("dashboard")} count={counts.attention} />
        <NavItem icon={<Ic.People className="icon" />} label="People"     active={view === "contacts"}  onClick={() => setView("contacts")}  count={counts.total} />
        <NavItem icon={<Ic.Gift className="icon" />}   label="Gift vault" active={view === "gifts"}     onClick={() => setView("gifts")}     count={counts.gifts} />
        <div className="nav-section-title">Cadence</div>
        <NavItem icon={<span style={{width:14,height:14,borderRadius:"50%",background:"var(--accent)",  display:"inline-block",flexShrink:0}} />} label="Weekly"    onClick={() => setView("contacts")} count={counts.weekly} />
        <NavItem icon={<span style={{width:14,height:14,borderRadius:"50%",background:"var(--ok)",      display:"inline-block",flexShrink:0}} />} label="Monthly"   onClick={() => setView("contacts")} count={counts.monthly} />
        <NavItem icon={<span style={{width:14,height:14,borderRadius:"50%",background:"var(--muted-2)", display:"inline-block",flexShrink:0}} />} label="Quarterly" onClick={() => setView("contacts")} count={counts.quarterly} />
      </nav>
      <button className="btn btn-primary" onClick={onAdd} style={{justifyContent:"center"}}>
        <Ic.Plus className="icon" /> Add person
      </button>
      <div className="sidebar-footer">
        <ThemeToggle theme={theme} setTheme={setTheme} />
        <div className="user-chip">
          <div className="avatar">JA</div>
          <div style={{display:"flex",flexDirection:"column"}}>
            <div style={{fontSize:13,fontWeight:500}}>Jordan</div>
            <div style={{fontSize:11,color:"var(--muted)"}}>{counts.total} people in your circle</div>
          </div>
        </div>
        <div style={{fontSize:10,color:"var(--muted-2)",textAlign:"center",letterSpacing:"0.04em"}}>v{APP_VERSION}</div>
      </div>
    </aside>
  );
}

function MobileNav({ view, setView, counts, theme, setTheme }) {
  return (
    <nav className="mobile-nav" aria-label="Main navigation">
      <button className={view === "dashboard" ? "active" : ""} onClick={() => setView("dashboard")}
              aria-current={view === "dashboard" ? "page" : undefined}>
        <Ic.Home className="icon" />
        <span className="label">Today</span>
        {counts.attention > 0 && <span className="mobile-badge" aria-label={`${counts.attention} need attention`}>{counts.attention}</span>}
      </button>
      <button className={view === "contacts" ? "active" : ""} onClick={() => setView("contacts")}
              aria-current={view === "contacts" ? "page" : undefined}>
        <Ic.People className="icon" />
        <span className="label">People</span>
      </button>
      <button className={view === "gifts" ? "active" : ""} onClick={() => setView("gifts")}
              aria-current={view === "gifts" ? "page" : undefined}>

        <span className="label">Gifts</span>
      </button>
      <button onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
              aria-label={`Switch to ${theme === "dark" ? "light" : "dark"} mode`}>
        {theme === "dark" ? <Ic.Sun className="icon" /> : <Ic.Moon className="icon" />}
        <span className="label">{theme === "dark" ? "Light" : "Dark"}</span>
      </button>
      <div style={{position:"absolute",bottom:4,left:0,right:0,textAlign:"center",fontSize:9,color:"var(--muted-2)",letterSpacing:"0.04em",pointerEvents:"none"}}>v{APP_VERSION}</div>
    </nav>
  );
}

function AttentionRow({ contact, onOpen }) {
  const st = statusOf(contact);
  const cad = CADENCES[contact.cadence];
  const overdueBy = contact.lastSeen - cad.days;
  const nudge =
    st.key === "over" ? `${daysWord(overdueBy)} overdue` :
    st.key === "due"  ? "Due this week" : "Recent";
  return (
    <button className={`attention-row ${st.key === "over" ? "warn" : st.key} lift`} onClick={onOpen}>
      <CadenceRing ratio={st.ratio} initials={initialsOf(contact.name)} status={st.key} />
      <div>
        <div className="name">{contact.name}</div>
        <div className="meta">
          <span>{contact.relation}</span>
          <span className="dot" aria-hidden />
          <span>{cad.label.toLowerCase()} cadence</span>
        </div>
      </div>
      <div className="since">
        {daysWord(contact.lastSeen)}
        <small>since last touch</small>
      </div>
      <div className="nudge">{nudge}</div>
    </button>
  );
}

function StripCard({ contact, dayLabel, onOpen }) {
  return (
    <button className="strip-card lift" onClick={onOpen}>
      <div className="strip-day">{dayLabel}</div>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        <div className="avatar">{initialsOf(contact.name)}</div>
        <div className="strip-name">{contact.name}</div>
      </div>
      <div className="strip-foot">
        <span>{contact.relation}</span>
        <span>{CADENCES[contact.cadence].label.toLowerCase()}</span>
      </div>
    </button>
  );
}

function GiftSnap({ contact, gift, onOpen }) {
  return (
    <button className="gift-card lift" onClick={onOpen} style={{textAlign:"left"}}>
      <div className="for">
        <div className="avatar" style={{width:20,height:20,fontSize:9}}>{initialsOf(contact.name)}</div>
        for {contact.name.split(" ")[0]}
      </div>
      <div className="idea">{gift.text}</div>
      <div className="quote">"{gift.cite}"</div>
    </button>
  );
}

function ContactRow({ contact, onOpen }) {
  const st = statusOf(contact);
  const cad = CADENCES[contact.cadence];
  const overdueBy = contact.lastSeen - cad.days;
  const statusText =
    st.key === "over" ? `${daysWord(overdueBy)} overdue` :
    st.key === "due"  ? "Due soon" :
    `${daysWord(contact.lastSeen)} ago`;
  const statusCls = st.key === "over" ? "warn" : st.key === "due" ? "due" : "";
  return (
    <button className="contact-row lift" onClick={onOpen}>
      <CadenceRing ratio={st.ratio} initials={initialsOf(contact.name)} status={st.key} />
      <div>
        <div className="name">{contact.name}</div>
        <div className="relation">{contact.relation}</div>
      </div>
      <div className="right">
        <div className="cadence-tag">{cad.label}</div>
        <div className={`status ${statusCls}`}>{statusText}</div>
      </div>
    </button>
  );
}

function CadencePicker({ value, onChange }) {
  return (
    <div className="cadence-grid" role="radiogroup" aria-label="Keep-in-touch cadence">
      {Object.entries(CADENCES).filter(([k]) => k !== "yearly").map(([k, c]) => (
        <button key={k} type="button"
                className={`cadence-opt ${value === k ? "on" : ""}`}
                onClick={() => onChange(k)} role="radio" aria-checked={value === k}>
          <span className="label">{c.label}</span>
          <span className="hint">{c.hint}</span>
        </button>
      ))}
    </div>
  );
}

function AddContactModal({ open, onClose, onCreate }) {
  const [name, setName] = React.useState("");
  const [relation, setRelation] = React.useState("");
  const [cadence, setCadence] = React.useState("monthly");
  React.useEffect(() => { if (open) { setName(""); setRelation(""); setCadence("monthly"); } }, [open]);
  React.useEffect(() => {
    if (!open) return;
    const h = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [open, onClose]);
  return (
    <div className={`modal-scrim ${open ? "open" : ""}`} onClick={onClose}
         role="dialog" aria-modal="true" aria-label="Add someone to your circle">
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <h2>Add someone to your circle</h2>
        <p className="lead">A person you want to stay close to, and how often you'd like to check in.</p>
        <div className="field">
          <label htmlFor="modal-name">Name</label>
          <input id="modal-name" value={name} onChange={(e) => setName(e.target.value)} placeholder="Their full name" autoFocus />
        </div>
        <div className="field">
          <label htmlFor="modal-relation">Relationship</label>
          <input id="modal-relation" value={relation} onChange={(e) => setRelation(e.target.value)} placeholder="Sister, college friend, mentor…" />
        </div>
        <div className="field">
          <label>Keep-in-touch cadence</label>
          <CadencePicker value={cadence} onChange={setCadence} />
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-accent" disabled={!name.trim()}
                  onClick={() => { onCreate({ name: name.trim(), relation: relation.trim() || "Friend", cadence }); onClose(); }}>
            Add to circle
          </button>
        </div>
      </div>
    </div>
  );
}

function ContactDrawer({ contact, open, onClose, onLog, onToggleGift, onAddGift, onDelete, onUrgent }) {
  const [draft, setDraft] = React.useState("");
  const [cite, setCite]   = React.useState("");
  React.useEffect(() => {
    if (!open) return;
    const h = (e) => { if (e.key === "Escape") onClose(); };
    document.addEventListener("keydown", h);
    return () => document.removeEventListener("keydown", h);
  }, [open, onClose]);
  if (!contact) return <div className={`drawer ${open ? "open" : ""}`} aria-hidden="true" />;
  const st = statusOf(contact);
  const cad = CADENCES[contact.cadence];
  const overdueBy = contact.lastSeen - cad.days;
  const sinceLabel =
    st.key === "over" ? `${daysWord(overdueBy)} overdue` :
    st.key === "due"  ? "Due soon" : "On track";
  return (
    <div className={`drawer ${open ? "open" : ""}`} role="dialog" aria-modal="true"
         aria-label={`${contact.name} details`}>
      <div className="drawer-head">
        <div className="top">
          <span style={{fontSize:11,letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--muted)"}}>Person</span>
          <button className="btn btn-ghost" onClick={onClose} aria-label="Close drawer">
            <Ic.Close className="icon" />
          </button>
        </div>
        <div className="title-row">
          <div className="avatar lg">{initialsOf(contact.name)}</div>
          <div>
            <h2 className="drawer-name">{contact.name}</h2>
            <div className="drawer-relation">{contact.relation}{contact.notes ? ` — ${contact.notes}` : ""}</div>
          </div>
        </div>
        <div className="drawer-status">
          <div className="col"><span className="k">Last touch</span><span className="v">{daysWord(contact.lastSeen)}</span></div>
          <div className="col"><span className="k">Cadence</span><span className="v">{cad.label}</span></div>
          <div className="col"><span className="k">Status</span>
            <span className={`v ${st.key === "over" ? "warn" : st.key === "due" ? "due" : ""}`}>{sinceLabel}</span>
          </div>
        </div>
        <div className="drawer-actions">
          <button className="btn btn-accent" onClick={() => onLog(contact.id)}>
            <Ic.Check className="icon" /> I reached out
          </button>
          <button className="btn" onClick={() => onLog(contact.id, "Called")}><Ic.Phone className="icon" /> Call</button>
          <button className="btn" onClick={() => onLog(contact.id, "Messaged")}><Ic.Message className="icon" /> Message</button>
          <button className="btn" onClick={() => onUrgent(contact.id)} style={{color:"var(--accent)"}} aria-label="Flag as urgent"><Ic.Bell className="icon" /></button>
        </div>
      </div>
      <div className="drawer-body">
        <section>
          <h3 className="block-title">Recent touchpoints <small>{contact.timeline.length} logged</small></h3>
          <div className="timeline">
            {contact.timeline.map((t, i) => (
              <div key={i} className={`tl-item ${i === 0 ? "recent" : ""}`}>
                <div>
                  <div className="tl-kind">{t.kind}</div>
                  {t.note && <div className="tl-note">{t.note}</div>}
                </div>
                <div className="tl-when">{t.when}</div>
              </div>
            ))}
          </div>
        </section>
        <section>
          <h3 className="block-title">
            Gift vault
            <small>{contact.gifts.filter(g => !g.done).length} open · {contact.gifts.filter(g => g.done).length} given</small>
          </h3>
          <div className="vault">
            {contact.gifts.map((g) => (
              <div key={g.id} className={`vault-item ${g.done ? "done" : ""}`}>
                <button className={`vault-check ${g.done ? "on" : ""}`}
                        onClick={() => onToggleGift(contact.id, g.id)}
                        role="checkbox" aria-checked={g.done}
                        aria-label={g.done ? `Unmark "${g.text}" as given` : `Mark "${g.text}" as given`}>
                  <div className="vault-check-inner">
                    {g.done && <Ic.Check className="icon-sm" />}
                  </div>
                </button>
                <div className="vault-text">
                  <div className="vault-idea">{g.text}</div>
                  {g.cite && <div className="vault-cite">{g.cite}</div>}
                </div>
                {g.tag && <span className="vault-tag">{g.tag}</span>}
              </div>
            ))}
            <div className="vault-add">
              <Ic.Plus className="icon" style={{color:"var(--muted)",flexShrink:0}} />
              <input value={draft} onChange={(e) => setDraft(e.target.value)}
                     placeholder="A new idea they've mentioned…" aria-label="New gift idea"
                     onKeyDown={(e) => {
                       if (e.key === "Enter" && draft.trim()) {
                         onAddGift(contact.id, { text: draft.trim(), cite: cite.trim(), done: false, tag: "" });
                         setDraft(""); setCite("");
                       }
                     }} />
              <input className="cite-input" value={cite} onChange={(e) => setCite(e.target.value)}
                     placeholder="where you heard it (optional)" aria-label="Where you heard this gift idea" />
            </div>
          </div>
        </section>
        <section>
          <h3 className="block-title">Notes</h3>
          <div style={{background:"var(--surface)",border:"1px solid var(--line)",borderRadius:"var(--radius)",padding:"14px 16px",fontSize:13.5,lineHeight:1.55,color:"var(--ink-2)"}}>
            {contact.notes || <span style={{color:"var(--muted)"}}>Add a few details you want to remember…</span>}
          </div>
        </section>

        <section style={{borderTop:"1px solid var(--line)",paddingTop:24,marginTop:8}}>
          <button className="btn btn-danger" style={{width:"100%",justifyContent:"center",borderRadius:"var(--radius)"}}
                  onClick={() => { if (window.confirm(`Remove ${contact.name} from your circle?`)) { onDelete(contact.id); onClose(); } }}
                  aria-label={`Remove ${contact.name} from circle`}>
            Remove from circle
          </button>
        </section>
      </div>
    </div>
  );
}
  </script>

  <!-- ── app ── -->
  <script type="text/babel">
const { useState, useMemo, useEffect } = React;

function toRow(c) {
  return { id: c.id, name: c.name, relation: c.relation, cadence: c.cadence, last_seen: c.lastSeen, notes: c.notes, timeline: c.timeline, gifts: c.gifts };
}
function fromRow(r) {
  return { id: r.id, name: r.name, relation: r.relation, cadence: r.cadence, lastSeen: r.last_seen, notes: r.notes, timeline: r.timeline || [], gifts: r.gifts || [] };
}

function greetingFor(date) {
  const h = date.getHours();
  if (h < 5)  return "Burning the midnight oil";
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  if (h < 21) return "Good evening";
  return "Good night";
}
function formatDate(d) {
  return d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric" });
}

function Dashboard({ contacts, openContact, onAdd }) {
  const sorted = useMemo(() => contacts.slice().sort((a, b) => statusOf(b).ratio - statusOf(a).ratio), [contacts]);
  const attention   = sorted.filter(c => statusOf(c).key !== "ok");
  const upcoming    = sorted.filter(c => statusOf(c).key === "due" || statusOf(c).key === "over").slice(0, 4);
  const recentGifts = useMemo(() => {
    const rows = [];
    contacts.forEach(c => c.gifts.filter(g => !g.done).slice(0, 1).forEach(g => rows.push({ c, g })));
    return rows.slice(0, 3);
  }, [contacts]);
  const today        = new Date();
  const overdueCount = contacts.filter(c => statusOf(c).key === "over").length;
  const dueCount     = contacts.filter(c => statusOf(c).key === "due").length;
  const onTrack      = contacts.length - overdueCount - dueCount;
  const giftCount    = contacts.reduce((s, c) => s + c.gifts.filter(g => !g.done).length, 0);
  const week    = [3, 1, 2, 0, 4, 2, 1];
  const weekMax = Math.max(...week);
  return (
    <main className="main">
      <div className="page-header">
        <div>
          <h1 className="greeting">{greetingFor(today)},<br/><em>Jordan</em></h1>
          <div className="subgreeting">{formatDate(today)} · {overdueCount > 0 ? `${overdueCount} ${overdueCount === 1 ? "person needs" : "people need"} a nudge` : "You're all caught up"}</div>
        </div>
        <button className="btn btn-primary" onClick={onAdd}>
          <Ic.Plus className="icon" /> Log a touchpoint
        </button>
      </div>
      <div className="stat-row">
        <div className="stat-card accent">
          <div>
            <div className="stat-label">Needs your attention</div>
            <div className="stat-value">{overdueCount + dueCount}<span className="unit">of {contacts.length}</span></div>
          </div>
          <div className="stat-foot">{overdueCount} overdue, {dueCount} due this week. Tap below to reach out.</div>
        </div>
        <div className="stat-card">
          <div>
            <div className="stat-label">On track</div>
            <div className="stat-value">{onTrack}</div>
          </div>
          <div className="stat-foot">Within their cadence — no action needed.</div>
        </div>
        <div className="stat-card">
          <div>
            <div className="stat-label">This week</div>
            <div className="weekstrip" aria-label="Touchpoints this week">
              {week.map((v, i) => (
                <div key={i} className="bar"><div className="fill" style={{height:`${(v/weekMax)*100}%`}} /></div>
              ))}
            </div>
            <div className="weekstrip-labels" aria-hidden>
              {["M","T","W","T","F","S","S"].map((d,i) => <span key={i}>{d}</span>)}
            </div>
          </div>
          <div className="stat-foot">{week.reduce((a,b)=>a+b,0)} touchpoints logged</div>
        </div>
      </div>
      <section className="section">
        <div className="section-head">
          <h2 className="section-title">Who needs you most</h2>
          <span className="section-meta">Sorted by urgency · {attention.length} people</span>
        </div>
        <div className="attention-list">
          {attention.length === 0 && <div className="empty-soft">Beautifully empty. Your circle is in great shape today.</div>}
          {attention.slice(0, 5).map(c => <AttentionRow key={c.id} contact={c} onOpen={() => openContact(c.id)} />)}
        </div>
      </section>
      <section className="section">
        <div className="section-head">
          <h2 className="section-title">Coming up</h2>
          <span className="section-meta">Next four nudges</span>
        </div>
        <div className="strip">
          {upcoming.map(c => {
            const cad = CADENCES[c.cadence];
            const overdueBy = c.lastSeen - cad.days;
            return <StripCard key={c.id} contact={c} dayLabel={overdueBy > 0 ? `${daysWord(overdueBy)} late` : "this week"} onOpen={() => openContact(c.id)} />;
          })}
        </div>
      </section>
      <section className="section">
        <div className="section-head">
          <h2 className="section-title">Recent gift ideas</h2>
          <span className="section-meta">{giftCount} ideas across your circle</span>
        </div>
        <div className="gift-snap">
          {recentGifts.map(({ c, g }) => <GiftSnap key={g.id} contact={c} gift={g} onOpen={() => openContact(c.id)} />)}
        </div>
      </section>
    </main>
  );
}

function ContactsPage({ contacts, openContact, onAdd }) {
  const [q, setQ]           = useState("");
  const [filter, setFilter] = useState("all");
  const list = useMemo(() => {
    return contacts.filter(c => {
      if (q && !(`${c.name} ${c.relation}`.toLowerCase().includes(q.toLowerCase()))) return false;
      const st = statusOf(c).key;
      if (filter === "over"      && st !== "over")            return false;
      if (filter === "due"       && st !== "due")             return false;
      if (filter === "ok"        && st !== "ok")              return false;
      if (filter === "weekly"    && c.cadence !== "weekly")    return false;
      if (filter === "monthly"   && c.cadence !== "monthly")   return false;
      if (filter === "quarterly" && c.cadence !== "quarterly") return false;
      return true;
    }).sort((a, b) => statusOf(b).ratio - statusOf(a).ratio);
  }, [contacts, q, filter]);
  return (
    <main className="main">
      <div className="page-header">
        <div>
          <h1 className="greeting">People</h1>
          <div className="subgreeting">{contacts.length} in your circle · sorted by who's most overdue</div>
        </div>
        <button className="btn btn-primary" onClick={onAdd}><Ic.Plus className="icon" /> Add person</button>
      </div>
      <div className="toolbar">
        <div className="search">
          <Ic.Search className="icon" style={{color:"var(--muted)"}} />
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search by name or relationship…" aria-label="Search contacts" />
        </div>
        <div className="chips" role="group" aria-label="Filter contacts">
          {[["all","Everyone"],["over","Overdue"],["due","Due soon"],["weekly","Weekly"],["monthly","Monthly"],["quarterly","Quarterly"]].map(([k, label]) => (
            <button key={k} className={`chip ${filter === k ? "on" : ""}`} onClick={() => setFilter(k)} aria-pressed={filter === k}>{label}</button>
          ))}
        </div>
      </div>
      <div className="contact-grid">
        {list.map(c => <ContactRow key={c.id} contact={c} onOpen={() => openContact(c.id)} />)}
      </div>
      {list.length === 0 && <div className="empty-soft" style={{textAlign:"center",padding:"40px 0"}}>No one matches that — try a different filter.</div>}
    </main>
  );
}

function GiftsPage({ contacts, openContact }) {
  const allGifts = useMemo(() => {
    const rows = [];
    contacts.forEach(c => c.gifts.forEach(g => rows.push({ c, g })));
    return rows;
  }, [contacts]);
  const open  = allGifts.filter(r => !r.g.done);
  const given = allGifts.filter(r => r.g.done);
  return (
    <main className="main">
      <div className="page-header">
        <div>
          <h1 className="greeting">Gift vault</h1>
          <div className="subgreeting">Things people have mentioned wanting — captured before they're forgotten</div>
        </div>
      </div>
      <section className="section" style={{marginTop:0}}>
        <div className="section-head">
          <h2 className="section-title">Open ideas</h2>
          <span className="section-meta">{open.length} across {new Set(open.map(r => r.c.id)).size} people</span>
        </div>
        <div className="gift-snap">
          {open.map(({ c, g }) => <GiftSnap key={g.id} contact={c} gift={g} onOpen={() => openContact(c.id)} />)}
        </div>
      </section>
      <section className="section">
        <div className="section-head">
          <h2 className="section-title">Already given</h2>
          <span className="section-meta">{given.length} delivered</span>
        </div>
        <div className="gift-snap">
          {given.map(({ c, g }) => (
            <div key={g.id} className="gift-card" style={{opacity:0.65}}>
              <div className="for"><div className="avatar" style={{width:20,height:20,fontSize:9}}>{initialsOf(c.name)}</div>given to {c.name.split(" ")[0]}</div>
              <div className="idea" style={{textDecoration:"line-through",textDecorationColor:"var(--line-2)"}}>{g.text}</div>
              <div className="quote">"{g.cite}"</div>
            </div>
          ))}
          {given.length === 0 && <div className="empty-soft">Mark gifts as given from a person's page to see them here.</div>}
        </div>
      </section>
    </main>
  );
}

function App() {
  const [theme, setTheme] = useState(() => { try { return localStorage.getItem("circle-theme") || "light"; } catch { return "light"; } });
  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem("circle-theme", theme); } catch {}
  }, [theme]);

  const [contacts, setContacts] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [view, setView]         = useState("dashboard");
  const [openId, setOpenId]     = useState(null);
  const [addOpen, setAddOpen]   = useState(false);

  useEffect(() => {
    if (!db) {
      setContacts(INITIAL_CONTACTS);
      setLoading(false);
      return;
    }
    db.from('contacts').select('*').order('created_at').then(({ data, error }) => {
      if (error) { console.error('Failed to load contacts:', error); setLoading(false); return; }
      setContacts(data.map(fromRow));
      setLoading(false);
    });
  }, []);

  const counts = useMemo(() => ({
    total:     contacts.length,
    attention: contacts.filter(c => statusOf(c).key !== "ok").length,
    gifts:     contacts.reduce((s, c) => s + c.gifts.filter(g => !g.done).length, 0),
    weekly:    contacts.filter(c => c.cadence === "weekly").length,
    monthly:   contacts.filter(c => c.cadence === "monthly").length,
    quarterly: contacts.filter(c => c.cadence === "quarterly").length,
  }), [contacts]);

  const openContact = (id) => setOpenId(id);
  const closeDrawer = ()   => setOpenId(null);

  const logTouchpoint = (id, kind = "Reached out") => {
    const contact = contacts.find(c => c.id === id);
    if (!contact) return;
    const updated = { ...contact, lastSeen: 0, timeline: [{ kind, when: "just now", note: "Logged via Circle" }, ...contact.timeline] };
    setContacts(cs => cs.map(c => c.id === id ? updated : c));
    if (db) db.from('contacts').update(toRow(updated)).eq('id', id).then(({ error }) => {
      if (error) console.error('Failed to save touchpoint:', error);
    });
  };

  const toggleGift = (cid, gid) => {
    const contact = contacts.find(c => c.id === cid);
    if (!contact) return;
    const updated = { ...contact, gifts: contact.gifts.map(g => g.id === gid ? { ...g, done: !g.done } : g) };
    setContacts(cs => cs.map(c => c.id === cid ? updated : c));
    if (db) db.from('contacts').update(toRow(updated)).eq('id', cid).then(({ error }) => {
      if (error) console.error('Failed to save gift update:', error);
    });
  };

  const addGift = (cid, gift) => {
    const contact = contacts.find(c => c.id === cid);
    if (!contact) return;
    const updated = { ...contact, gifts: [...contact.gifts, { ...gift, id: "g" + Math.random().toString(36).slice(2, 8) }] };
    setContacts(cs => cs.map(c => c.id === cid ? updated : c));
    if (db) db.from('contacts').update(toRow(updated)).eq('id', cid).then(({ error }) => {
      if (error) console.error('Failed to save new gift:', error);
    });
  };

  const markUrgent = (id) => {
    const contact = contacts.find(c => c.id === id);
    if (!contact) return;
    const updated = { ...contact, lastSeen: contact.lastSeen + 30 };
    setContacts(cs => cs.map(c => c.id === id ? updated : c));
    if (db) db.from('contacts').update(toRow(updated)).eq('id', id).then(({ error }) => {
      if (error) console.error('Failed to mark urgent:', error);
    });
    closeDrawer();
    setView("dashboard");
  };

  const deleteContact = (id) => {
    setContacts(cs => cs.filter(c => c.id !== id));
    if (db) {
      db.from('contacts').delete().eq('id', id).then(({ error }) => {
        if (error) console.error('Delete failed:', error);
        else console.log('Deleted contact', id);
      });
    } else {
      console.warn('db is null — delete not persisted');
    }
  };

  const addContact = ({ name, relation, cadence }) => {
    const id = "c" + Math.random().toString(36).slice(2, 8);
    const newContact = { id, name, relation, cadence, lastSeen: 0, notes: "", timeline: [{ kind: "Added to circle", when: "just now", note: "" }], gifts: [] };
    setContacts(cs => [...cs, newContact]);
    if (db) {
      db.from('contacts').insert(toRow(newContact)).then(({ error }) => {
        if (error) {
          console.error('Add contact failed:', error);
          setContacts(cs => cs.filter(c => c.id !== id));
          alert('Failed to save contact: ' + error.message);
        }
      });
    }
  };

  const openContactObj = contacts.find(c => c.id === openId);

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:"var(--muted)",fontSize:14,fontFamily:"var(--sans)"}}>
      Loading your circle…
    </div>
  );

  return (
    <div className="app">
      <Sidebar view={view} setView={setView} theme={theme} setTheme={setTheme} counts={counts} onAdd={() => setAddOpen(true)} />
      {view === "dashboard" && <Dashboard contacts={contacts} openContact={openContact} onAdd={() => setAddOpen(true)} />}
      {view === "contacts"  && <ContactsPage contacts={contacts} openContact={openContact} onAdd={() => setAddOpen(true)} />}
      {view === "gifts"     && <GiftsPage contacts={contacts} openContact={openContact} />}
      {(view === "dashboard" || view === "contacts") && (
        <button className="mobile-fab" onClick={() => setAddOpen(true)} aria-label="Add person">
          <Ic.Plus className="icon" />
        </button>
      )}
      <MobileNav view={view} setView={setView} counts={counts} theme={theme} setTheme={setTheme} />
      <div className={`scrim ${openId ? "open" : ""}`} onClick={closeDrawer} aria-hidden="true" />
      <ContactDrawer contact={openContactObj} open={!!openId} onClose={closeDrawer}
                     onLog={logTouchpoint} onToggleGift={toggleGift} onAddGift={addGift} onDelete={deleteContact} onUrgent={markUrgent} />
      <AddContactModal open={addOpen} onClose={() => setAddOpen(false)} onCreate={addContact} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <!-- Service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .catch(function (err) { console.warn('SW registration failed:', err); });
      });
    }
